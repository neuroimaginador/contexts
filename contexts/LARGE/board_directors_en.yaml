title: Board Directors
source: "C. Seierstad, T. Opsahl. For the few not the many? the effects of affirmative action on presence. Prominence, Soc. Cap. Women Dir. Nor. Scand. J. Manag., 27 (1) (2011), pp. 44-54"
size:
