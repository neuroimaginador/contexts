description: The dataset analyzes the presence, prominence, and social capital of women on corporate boards in Norway. This dataset involves a formal context representing board members and their affiliations, with entities reflecting individuals and attributes indicating organizational connections or roles, highlighting the broader social and structural dynamics influencing board composition.